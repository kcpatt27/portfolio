<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Roadmaps — Kalen Patterson</title>
  <meta name="description" content="Project roadmaps and development progress tracking for Kalen Patterson's development projects." />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      /* Cyberpunk/Space Theme Colors */
      --moonshadow: #2D1B69;        /* Deep purple */
      --cosmic-pink: #FF6B9D;        /* Hot pink */
      --sunset-orange: #FF8C42;      /* Warm orange */
      --space-blue: #4A90E2;         /* Electric blue */
      --nebula-purple: #8B5FBF;      /* Lighter purple */
      --starlight-pink: #FFB6C1;     /* Soft pink */
      --aurora-green: #00D4AA;       /* Cyber green */
      --void-black: #0A0A0F;         /* Deep space */
      --cloud-white: #F8F9FA;        /* Pure white */
      --terminal-green: #00ff41;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,'Helvetica Neue',Arial;color:#e6eef6;background:linear-gradient(180deg,#081027 0%, #071021 100%);scroll-behavior:smooth;}
    a{color:inherit;text-decoration:none}
    .container{max-width:1200px;margin:0 auto;padding:0 28px}

    header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid rgba(255,107,157,0.2);}
    .back-to-portfolio{display:inline-flex;align-items:center;gap:8px;color:var(--aurora-green);font-weight:600;font-size:16px;}
    .back-to-portfolio:hover{color:var(--cosmic-pink);}
    nav a{margin-left:24px;color:var(--starlight-pink);font-weight:500;font-size:16px;transition:color 0.3s ease;display:inline-block;padding-bottom:6px;border-bottom:2px solid transparent;margin-bottom:-8px;}
    nav a:hover{color:var(--cosmic-pink);}
    body.page-docs nav a[href="docs.html"],body.page-roadmaps nav a[href="roadmaps.html"],body.page-blog nav a[href="blog.html"]{border-bottom-color:var(--cosmic-pink);color:var(--cosmic-pink);}

    .roadmap-grid{display:grid;grid-template-columns:300px 1fr;gap:40px;margin-top:40px;}

    .projects-sidebar{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,107,157,0.1);border-radius:12px;padding:24px;}
    .projects-sidebar h3{margin:0 0 20px;color:var(--cosmic-pink);font-size:18px;}
    .project-item{margin-bottom:12px;padding:12px;border-radius:8px;cursor:pointer;transition:all 0.3s ease;border:1px solid transparent;width:100%;text-align:left;background:transparent;font:inherit;}
    .project-item:hover{background:rgba(255,107,157,0.05);border-color:rgba(255,107,157,0.2);}
    .project-item.active{background:rgba(255,107,157,0.1);border-color:var(--cosmic-pink);}
    .project-item h4{margin:0 0 4px;font-size:14px;color:var(--cosmic-pink);}
    .project-item h4{margin:0 0 4px;font-size:14px;color:var(--cosmic-pink);}
    .project-item.mvp h4{color:var(--aurora-green);}
    .project-item.in-dev h4{color:var(--sunset-orange);}
    .project-item p{margin:0;font-size:12px;color:var(--starlight-pink);opacity:0.8;}
    .project-status{margin-top:8px;font-size:11px;padding:2px 6px;border-radius:10px;display:inline-block;}
    .status-completed{background:var(--aurora-green);color:var(--void-black);}
    .status-beta{background:var(--sunset-orange);color:var(--void-black);}
    .status-in-progress{background:var(--nebula-purple);color:white;}

    .roadmap-content{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,107,157,0.1);border-radius:12px;padding:32px;min-width:0;overflow-x:hidden;}
    .roadmap-title-row{display:flex;justify-content:space-between;align-items:center;margin:0 0 16px;gap:16px;flex-wrap:wrap;}
.roadmap-title-row h1{margin:0;color:#ffffff;font-size:2rem;}
    .roadmap-content h2{margin:32px 0 16px;color:var(--cosmic-pink);font-size:1.5rem;}

    .roadmap-visual{position:relative;padding-left:0;line-height:1.7;color:var(--starlight-pink);}
    .roadmap-visual h1,.roadmap-visual h2,.roadmap-visual h3,.roadmap-visual h4{color:var(--cosmic-pink);line-height:1.3;margin:28px 0 12px;}
    .roadmap-visual h1{font-size:1.7rem;margin-top:8px;}
    .roadmap-visual h2{font-size:1.35rem;}
    .roadmap-visual h3{font-size:1.1rem;color:var(--sunset-orange);}
    .roadmap-visual p{margin:0 0 14px;}
    .roadmap-visual strong{color:#ffffff;}
    .roadmap-visual ul,.roadmap-visual ol{margin:0 0 16px 20px;padding:0;}
    .roadmap-visual li{margin:0 0 8px;}
    .roadmap-visual hr{border:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,157,0.35),transparent);margin:22px 0;}
    .roadmap-visual blockquote{margin:20px 0;padding:14px 16px;border-left:3px solid var(--cosmic-pink);background:rgba(255,107,157,0.06);border-radius:8px;}
    .roadmap-visual code{font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,0.35);padding:1px 6px;border-radius:6px;color:#f6f7fb;}
    .roadmap-visual pre{background:rgba(0,0,0,0.45);border:1px solid rgba(255,107,157,0.2);border-radius:10px;padding:14px;overflow-x:auto;}
    .roadmap-visual pre code{background:transparent;padding:0;border-radius:0;}
    .roadmap-visual table{width:100%;border-collapse:collapse;margin:18px 0;border:1px solid rgba(255,255,255,0.12);}
    .roadmap-visual th,.roadmap-visual td{padding:10px;border:1px solid rgba(255,255,255,0.12);text-align:left;}
    .roadmap-visual th{color:#fff;background:rgba(255,107,157,0.08);}

    .progress-bar{width:100%;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;margin:16px 0;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg, var(--aurora-green), var(--sunset-orange), var(--cosmic-pink));border-radius:4px;transition:width 0.3s ease;}

    .roadmap-title-image{margin:0 0 20px;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,#1a1a2e,#0f0f23);height:200px;max-height:200px;width:100%;min-width:0;}
    .roadmap-title-image img{width:100%;max-width:100%;height:200px;object-fit:cover;object-position:top;display:block;}
    .roadmap-title-image .card-placeholder{height:200px;display:flex;align-items:center;justify-content:center;color:var(--cosmic-pink);font-size:14px;}

    .project-item:focus-visible{outline:2px solid var(--aurora-green);outline-offset:3px;}

    @media (max-width:768px){
      .roadmap-grid{grid-template-columns:1fr;}
      .projects-sidebar{margin-bottom:20px;}
      header{flex-direction:column;text-align:center;}
      nav{margin-top:16px;}
      .roadmap-content{padding:24px;}
      .roadmap-visual h1{font-size:1.45rem;}
      .roadmap-visual h2{font-size:1.2rem;}
    }
  </style>
</head>
<body class="page-roadmaps">
  <div class="container">
    <header>
      <a href="index.html" class="back-to-portfolio">← Back to Home</a>
      <nav>
        <a href="docs.html">Documentation</a>
        <a href="roadmaps.html">Roadmaps</a>
      </nav>
    </header>

    <main>
      <h1 style="color:#ffffff;font-size:2.5rem;text-align:center;margin:40px 0;">Project Roadmaps</h1>

      <div class="roadmap-grid">
        <div class="projects-sidebar">
          <h3>Projects</h3>
          <div id="roadmap-project-list">
            <p style="color:var(--starlight-pink);">Loading projects…</p>
          </div>
        </div>

        <div class="roadmap-content">
          <div class="roadmap-title-row">
            <h1 id="project-title">nextdish.app</h1>
            <div id="project-status-banner" class="project-status status-beta" aria-hidden="true">BETA</div>
          </div>
          <div class="roadmap-title-image" id="roadmap-title-image" aria-hidden="true"></div>

          <div class="progress-bar">
            <div class="progress-fill" id="overall-progress" style="width:70%"></div>
          </div>

          <div class="roadmap-visual" id="roadmap-visual">
            <p class="phase-description">Loading roadmap…</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    let currentProject = 'nextdish';

    let roadmapProjectsConfig = [];
    var roadmapCache = {};
    var projectImages = {
      'nextdish': 'project-images/nextdish-front-page.png',
      'global-info-portal': 'project-images/us-gip.png',
      'sqwease': 'project-images/sqwease-mainMenu-darkMode.png',
      'when-neptune-wakes': 'project-images/neptune-and-sun.png',
      'iq-up': 'project-images/moonshadow-brain.png',
      'savant-insights': 'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=800&q=60',
      'meridian-whisper': '',
      'memvid-mcp': '',
      'hollow-orbit': 'project-images/blue-jewel-neptune.png'
    };
    function escAttr(s) { return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function renderRoadmapMarkdown(markdown) {
      if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
        return DOMPurify.sanitize(marked.parse(markdown));
      }
      return '<pre style="white-space:pre-wrap;color:var(--starlight-pink);">' + escHtml(markdown) + '</pre>';
    }
    function loadRoadmapForProject(projectId, proj, targetEl) {
      var docsFolder = (proj && proj.docsFolder) ? proj.docsFolder : projectId;
      var cacheKey = docsFolder + '/ROADMAP.md';
      if (roadmapCache[cacheKey]) {
        targetEl.innerHTML = roadmapCache[cacheKey];
        return;
      }
      targetEl.innerHTML = '<p class="phase-description">Loading roadmap…</p>';
      fetch('_project-docs/' + encodeURIComponent(docsFolder) + '/ROADMAP.md')
        .then(function(r) { return r.ok ? r.text() : Promise.reject(); })
        .then(function(md) {
          var html = renderRoadmapMarkdown(md);
          roadmapCache[cacheKey] = html;
          targetEl.innerHTML = html;
        })
        .catch(function() {
          targetEl.innerHTML = '<p class="phase-description">Roadmap content for this project is not yet available.</p>';
        });
    }
    fetch('metadata/projects.config.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        roadmapProjectsConfig = data.projects || [];
        var list = document.getElementById('roadmap-project-list');
        var firstId = roadmapProjectsConfig.length ? roadmapProjectsConfig[0].id : '';
        var hashId = location.hash ? location.hash.slice(1) : '';
        if (hashId && roadmapProjectsConfig.some(function(p) { return p.id === hashId; })) firstId = hashId;
        currentProject = firstId;
        function esc(s) {
          var d = document.createElement('div');
          d.textContent = s;
          return d.innerHTML;
        }
        list.innerHTML = roadmapProjectsConfig.map(function(p, i) {
          var active = p.id === firstId ? ' active' : '';
          var phase = (p.status === 'completed' || p.status === 'beta') ? ' mvp' : ' in-dev';
          return '<button type="button" class="project-item' + active + phase + '" data-project-id="' + esc(p.id) + '">' +
            '<h4>' + esc(p.name) + '</h4><p>' + esc(p.description) + '</p></button>';
        }).join('');
        list.querySelectorAll('.project-item').forEach(function(item) {
          item.addEventListener('click', function() {
            loadProject(item.getAttribute('data-project-id'));
          });
        });
        if (firstId) loadProject(firstId);
      })
      .catch(function() {
        document.getElementById('roadmap-project-list').innerHTML = '<p style="color:var(--starlight-pink);">Could not load projects.</p>';
      });

    function loadProject(projectId) {
      currentProject = projectId;
      document.querySelectorAll('.project-item').forEach(function(item) {
        item.classList.toggle('active', item.getAttribute('data-project-id') === projectId);
      });

      var proj = roadmapProjectsConfig.find(function(p) { return p.id === projectId; });
      var titleEl = document.getElementById('project-title');
      var bannerEl = document.getElementById('project-status-banner');
      if (titleEl) titleEl.textContent = (proj && proj.name) || 'Roadmap';
      if (bannerEl) {
        if (!proj) {
          bannerEl.style.display = 'none';
        } else {
          bannerEl.style.display = '';
          if (proj.status === 'completed') { bannerEl.textContent = 'LIVE'; bannerEl.className = 'project-status status-completed'; }
          else if (proj.status === 'beta') { bannerEl.textContent = 'BETA'; bannerEl.className = 'project-status status-beta'; }
          else { bannerEl.textContent = (proj.completionPercent || 0) + '% Complete'; bannerEl.className = 'project-status status-in-progress'; }
        }
      }

      var titleImgEl = document.getElementById('roadmap-title-image');
      if (titleImgEl) {
        var imgSrc = projectImages[projectId];
        var projName = (proj && proj.name) || '';
        if (imgSrc) {
          titleImgEl.innerHTML = '<img src="' + escAttr(imgSrc) + '" alt="">';
        } else {
          titleImgEl.innerHTML = '<div class="card-placeholder">' + escHtml(projName) + '</div>';
        }
      }

      var progressEl = document.getElementById('overall-progress');
      var progress = (proj && typeof proj.completionPercent === 'number') ? proj.completionPercent : 0;
      progressEl.style.width = progress + '%';

      var roadmapVisual = document.getElementById('roadmap-visual');
      loadRoadmapForProject(projectId, proj, roadmapVisual);
    }
  </script>
</body>
</html>
